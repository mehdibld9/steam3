services:
  - type: web
    name: steamshare
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
