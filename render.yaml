services:
  - type: web
    name: steamshare
    runtime: node
    plan: free
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/steamshare run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
