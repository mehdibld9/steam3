          type: integer
        title:
          type: string
        description:
          type: string
        prize:
          type: string
        taskDescription:
          type: string
        maxEntries:
          type: integer
        entriesCount:
          type: integer
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        winnerUserId:
          type: ["integer", "null"]
        winnerUsername:
          type: ["string", "null"]
        userHasEntered:
          type: boolean
        createdAt:
          type: string
          format: date-time

    GiveawayInput:
      type: object
      required: [title, description, prize, taskDescription, endDate]
      properties:
        title:
          type: string
        description:
          type: string
        prize:
          type: string
        taskDescription:
          type: string
        maxEntries:
          type: integer
          default: 100
        endDate:
          type: string
          format: date-time

    EnterGiveawayInput:
